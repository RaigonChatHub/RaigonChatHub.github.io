name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare build environment
        env:
          BASE_PATH_VAR: ${{ vars.NEXT_PUBLIC_BASE_PATH }}
          SUPABASE_URL_SECRET: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_KEY_SECRET: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          if [ -n "$BASE_PATH_VAR" ]; then
            echo "NEXT_PUBLIC_BASE_PATH=$BASE_PATH_VAR" >> "$GITHUB_ENV"
          elif [ -z "$NEXT_PUBLIC_BASE_PATH" ]; then
            repo_name="${GITHUB_REPOSITORY##*/}"
            if [[ "$repo_name" == *.github.io ]]; then
              echo "NEXT_PUBLIC_BASE_PATH=/" >> "$GITHUB_ENV"
            else
              echo "NEXT_PUBLIC_BASE_PATH=/$repo_name" >> "$GITHUB_ENV"
            fi
          fi

          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ] && [ -n "$SUPABASE_URL_SECRET" ]; then
            echo "NEXT_PUBLIC_SUPABASE_URL=$SUPABASE_URL_SECRET" >> "$GITHUB_ENV"
          fi

          if [ -z "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ] && [ -n "$SUPABASE_ANON_KEY_SECRET" ]; then
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY_SECRET" >> "$GITHUB_ENV"
          fi

      - name: Validate build environment
        run: |
          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ] || [ -z "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ]; then
            echo "::error::Set NEXT_PUBLIC_SUPABASE_URL and NEXT_PUBLIC_SUPABASE_ANON_KEY as GitHub Actions variables or secrets for the github-pages environment, or as repository variables/secrets."
            exit 1
          fi

      - name: Build static site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
